<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <title>Faith Beyond Sundays</title>
    <meta name="description" content="Grow your faith beyond Sunday services with guided reflections, sermon notes, and daily devotionals.">
    <meta name="author" content="Faith Beyond Sundays" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="" />
    <meta name="theme-color" content="#6AADD4" />
    <script>
      (function () {
        var code = new URLSearchParams(location.search).get('church');
        if (!code) { try { code = localStorage.getItem('fbs_church_code'); } catch (e) {} }
        if (code) { try { localStorage.setItem('fbs_church_code', code); } catch (e) {} }
        var manifestHref = code ? '/api/manifest?church=' + encodeURIComponent(code) : '/manifest.json';
        document.write('<link rel="manifest" href="' + manifestHref + '">');
      })();
    </script>
    <link rel="canonical" href="https://faithbeyondsundays.app" />

    <meta property="og:title" content="Faith Beyond Sundays" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://faithbeyondsundays.app" />
    <meta property="og:description" content="Grow your faith beyond Sunday services with guided reflections, sermon notes, and daily devotionals." />
    <meta property="og:image" content="https://faithbeyondsundays.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="640" />

    <meta name="twitter:title" content="Faith Beyond Sundays" />
    <meta name="twitter:description" content="Grow your faith beyond Sunday services with guided reflections, sermon notes, and daily devotionals." />
    <meta name="twitter:image" content="https://faithbeyondsundays.app/og-image.png" />
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
