<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBS Color Options</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #b8cfe8 0%, #e8d5c4 50%, #e8c8a0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: rgba(0,0,0,0.4); text-transform: uppercase; align-self: flex-start; margin-left: calc(50% - 190px); }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px 24px;
    width: 380px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .icon-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .question { font-size: 18px; font-weight: 700; color: #1a1a2e; line-height: 1.4; margin-bottom: 10px; }
  .source { font-size: 13px; color: #999; margin-bottom: 18px; }
  .btn {
    width: 100%; padding: 16px; border-radius: 50px; border: none;
    color: #fff; font-size: 16px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px; cursor: default;
  }
  svg { width: 18px; height: 18px; }
</style>
</head>
<body>

<script>
const options = [
  { name: "1 — Avatar Gold",    btn: "#E8B84B", icon: "#FEF3D0", label: "#C99A30", shadow: "rgba(232,184,75,0.35)" },
  { name: "2 — Morning Honey",  btn: "#ECC96E", icon: "#FEF6E0", label: "#C9A030", shadow: "rgba(236,201,110,0.35)" },
  { name: "3 — Sunrise Peach",  btn: "#E8A96A", icon: "#FEF1E6", label: "#B86D30", shadow: "rgba(232,169,106,0.35)" },
  { name: "4 — Buttercup",      btn: "#F0C84E", icon: "#FEFBE6", label: "#B09000", shadow: "rgba(240,200,78,0.35)", dark: true },
  { name: "5 — Warm Sand",      btn: "#D9A87C", icon: "#FDF0E6", label: "#8C5E2A", shadow: "rgba(217,168,124,0.35)" },
];

const icon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>`;

options.forEach(o => {
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = o.name;
  document.body.appendChild(lbl);

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-top">
      <div class="icon-circle" style="background:${o.icon}; color:${o.btn}">${icon}</div>
      <span class="card-label" style="color:${o.label}">Today's Reflection</span>
    </div>
    <div class="question">What is one thing you're holding onto this week that you could trust God with instead?</div>
    <div class="source">From Sunday's sermon · Grace in the Storm</div>
    <button class="btn" style="background:${o.btn}; box-shadow: 0 4px 16px ${o.shadow}; color:${o.dark ? '#3a2a00' : '#fff'}">
      ${icon} Reflect
    </button>
  `;
  document.body.appendChild(card);
});
</script>

</body>
</html>
